services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: convo
      POSTGRES_USER: convo
      POSTGRES_PASSWORD: convo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U convo -d convo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: development
    env_file:
      - .env
    environment:
      # Overrides do docker-compose para usar os serviços internos da rede
      DATABASE_URL: postgresql+asyncpg://convo:convo@postgres:5432/convo
      SYNC_DATABASE_URL: postgresql://convo:convo@postgres:5432/convo
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      RUN_MIGRATIONS: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Hot reload em dev: monta o código local dentro do container
      - ./backend:/app
    command: ["--reload", "--log-level", "debug"]

  worker:
    build:
      context: ./backend
      target: development
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://convo:convo@postgres:5432/convo
      SYNC_DATABASE_URL: postgresql://convo:convo@postgres:5432/convo
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    entrypoint: []
    command:
      - uv
      - run
      - celery
      - -A
      - app.core.celery_app
      - worker
      - --loglevel=info
      - --concurrency=4

volumes:
  postgres_data:
  redis_data:
